name: Deploy Client via SFTP

on:
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'client/**'     # Only trigger if client files change
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-client.yml'

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🛠️ Build Project
      # This runs "vite build:client"
      # vite.config.ts sets output to ./dist/public
      run: npm run build:client
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}

    - name: 📂 Sync files via SFTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        protocol: ftps
        port: 21
        local-dir: ./dist/public/
        dangerous-clean-slate: true
