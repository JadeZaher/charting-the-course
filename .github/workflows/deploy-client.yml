name: Deploy Client via SFTP

on:
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - 'client/**'     # Only trigger if client files change
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-client.yml'

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🔍 Check Secrets
      env:
        # We map the secret to a shell variable just for this step
        CHECK_URL: ${{ secrets.VITE_SUPABASE_URL }}
        CHECK_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        if [ -z "$CHECK_URL" ]; then
          echo "🔴 ERROR: VITE_SUPABASE_URL is empty or missing from GitHub Secrets!"
          exit 1
        fi
        
        if [ -z "$CHECK_KEY" ]; then
          echo "🔴 ERROR: VITE_SUPABASE_ANON_KEY is empty or missing from GitHub Secrets!"
          exit 1
        fi
        
        echo "🟢 Success: Supabase secrets are present."

    - name: 🛠️ Build Project
      # This runs "vite build:client"
      # vite.config.ts sets output to ./dist/public
      run: npm run build:client
      env:
        # ⚠️ Vite needs these available during the build
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: 📂 Sync files via SFTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        protocol: ftps
        port: 21
        local-dir: ./dist/public/
        dangerous-clean-slate: true
        