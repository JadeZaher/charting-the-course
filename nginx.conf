server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver for dynamic service discovery
    resolver 127.0.0.11 valid=10s;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to backend
    # Use variable for proxy_pass to force dynamic DNS resolution at request time
    location /api/ {
        set $backend_url http://neos-operating-system:8080;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for messaging
    location /messaging/ws {
        set $backend_url http://neos-operating-system:8080;
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
